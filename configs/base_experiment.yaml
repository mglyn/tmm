project:
  name: tmm-chart
  root_dir: .
  data_dir: data
  outputs_dir: outputs
  reports_dir: reports

model:
  name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
  processor_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2
  image_min_pixels: 262144
  image_max_pixels: 1048576

dataset:
  seed: 42
  synthetic_chart_count: 1973
  router_holdout_count: 1200
  chart_types: [bar, line, pie, scatter, area]
  scenarios:
    - business
    - science
    - economics
    - healthcare
    - climate
    - education
    - finance
    - sports
    - energy
    - transportation
  expected_stage_counts:
    stage1_description: 1973
    stage2_basic_vqa: 1973
    stage3_reasoning_vqa: 1973
    stage4_visual_analysis: 5919
    stage5_code_generation: 1973
  image:
    width: 960
    height: 720
    dpi: 120
  difficulty:
    scorer: heuristic
    levels: 5
    manual_audit_size: 250

training:
  seed: 42
  effective_batch_size: 16
  gradient_accumulation_steps: 4
  num_train_epochs: 10
  warmup_ratio: 0.05
  weight_decay: 0.01
  logging_steps: 10
  save_strategy: epoch
  eval_strategy: "no"
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  lora:
    rank: 8
    alpha: 16
    dropout: 0.1
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - up_proj
      - down_proj
      - gate_proj
  stages:
    stage1_description:
      learning_rate: 1.0e-4
      max_seq_length: 2048
    stage2_basic_vqa:
      learning_rate: 5.0e-5
      max_seq_length: 2048
    stage3_reasoning_vqa:
      learning_rate: 3.0e-5
      max_seq_length: 2048
    stage4_visual_analysis:
      learning_rate: 3.0e-5
      max_seq_length: 2048
    stage5_code_generation:
      learning_rate: 2.0e-5
      max_seq_length: 4096

router:
  enabled: true
  hidden_dim: 1024
  dropout: 0.1
  learning_rate: 1.0e-4
  num_epochs: 5
  batch_size: 32
  deployable_stages:
    - stage2_basic_vqa
    - stage3_reasoning_vqa
    - stage4_visual_analysis
    - stage5_code_generation

evaluation:
  primary_benchmark: ChartQA
  benchmarks:
    - ChartQA
    - PlotQA
    - FigureQA
    - ChartBench
    - OpenCQA
  answer_normalization:
    numeric_tolerance: 1.0e-3
    lowercase: true
    strip_punctuation: true
  robustness:
    corruptions:
      - jpeg
      - gaussian_blur
      - low_resolution
      - color_jitter
      - partial_occlusion
  paper_backfill:
    target_tex: tmm_paper/main.tex
    metrics_json: outputs/paper/final_metrics.json
